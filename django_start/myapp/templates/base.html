<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Website{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1f2a37;
            --muted: #5a6573;
            --primary: #1e88e5;
            --primary-dark: #1669b2;
            --border: #d9e2ef;
            --shadow: 0 10px 25px rgba(16, 39, 68, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            width: min(960px, 92%);
            margin: 0 auto;
        }

        .site-nav {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(15, 35, 60, 0.06);
        }

        .site-nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 0;
        }

        .brand {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
            font-weight: 600;
        }

        .nav-links a:hover,
        .nav-links a:focus-visible {
            background: #eaf3fe;
            color: var(--primary-dark);
            border-color: #c9e0fb;
            outline: none;
        }

        main {
            padding: 24px 0 40px;
        }

        .page-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: clamp(18px, 3vw, 30px);
        }

        h1, h2, h3 {
            line-height: 1.25;
            margin-top: 0;
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width: 600px) {
            .site-nav-inner {
                align-items: flex-start;
                flex-direction: column;
            }

            .nav-links {
                width: 100%;
            }

            .nav-links a {
                text-align: center;
                flex: 1 1 30%;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="site-nav">
        <div class="container site-nav-inner">
            <p class="brand">MeroSite</p>
            <div class="nav-links" aria-label="Main navigation">
                <a href="{% url 'index' %}">Home</a>
                <a href="{% url 'gallery' %}">Gallery</a>
                <a href="{% url 'stats' %}">Stats</a>
                <a href="{% url 'task_create' %}">New Task</a>
                <a href="{% url 'task_list' %}">Task Board</a>
               {% if user.is_authenticated %}
               <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                <a href="{% url 'login' %}">Login</a>
               {% endif %}
                <a href="{% url 'admin' %}">Admin</a>
              
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main>
        <div class="container">
            <section class="page-card">
                {% block content %}
                {% endblock %}
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

</body>
</html>
